name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  changelog:
    name: Changelog
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check CHANGELOG.md was updated
        run: |
          if git diff --name-only origin/main...HEAD | grep -q '^CHANGELOG.md$'; then
            echo "CHANGELOG.md updated"
          else
            echo "::error::CHANGELOG.md was not updated. Please add an entry describing your changes."
            exit 1
          fi

  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libopus-dev
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Clippy (opus-codec feature)
        run: cargo clippy --features opus-codec --all-targets -- -D warnings
      - name: Clippy (g729-codec feature)
        run: cargo clippy --features g729-codec --all-targets -- -D warnings
      - name: Clippy (cli feature)
        run: cargo clippy --example sipcli --features cli -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libopus-dev
      - name: Test
        run: cargo test --verbose
      - name: Test (opus-codec feature)
        run: cargo test --features opus-codec --verbose
      - name: Test (g729-codec feature)
        run: cargo test --features g729-codec --verbose
      - name: Test (release)
        run: cargo test --release

  integration:
    name: Integration (Docker/Asterisk + CoTURN)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libopus-dev
      - name: Start Asterisk + CoTURN
        run: docker compose -f testutil/docker/docker-compose.yml up -d --wait
      - name: Run integration tests (Asterisk)
        run: cargo test --features integration --test integration_test -- --nocapture --test-threads=1
      - name: Run TURN/ICE integration tests
        run: cargo test --features integration --test turn_test -- --nocapture --test-threads=1
      - name: Stop services
        if: always()
        run: docker compose -f testutil/docker/docker-compose.yml down

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libopus-dev
      - name: Build library
        run: cargo build
      - name: Build library (opus-codec)
        if: runner.os == 'Linux'
        run: cargo build --features opus-codec
      - name: Build library (g729-codec)
        run: cargo build --features g729-codec
      - name: Build sipcli
        run: cargo build --example sipcli --features cli --release
