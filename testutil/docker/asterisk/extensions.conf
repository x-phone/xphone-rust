;
; extensions.conf — Dialplan for xphone integration tests
;
; Routes calls between extensions 1001, 1002, 1003.
; Also provides an echo test at extension 9999.
;

[general]
static=yes
writeprotect=no

[xphone-test]
; Hints for BLF (Busy Lamp Field) — required for dialog event SUBSCRIBE
exten => 1001,hint,PJSIP/1001
exten => 1002,hint,PJSIP/1002
exten => 1003,hint,PJSIP/1003

; Direct dialing between extensions
exten => 1001,1,NoOp(Call to 1001)
 same => n,Dial(PJSIP/1001,30)
 same => n,Hangup()

exten => 1002,1,NoOp(Call to 1002)
 same => n,Dial(PJSIP/1002,30)
 same => n,Hangup()

exten => 1003,1,NoOp(Call to 1003)
 same => n,Dial(PJSIP/1003,30)
 same => n,Hangup()

; Echo test — reflects audio back to caller (useful for media verification)
exten => 9999,1,NoOp(Echo test)
 same => n,Answer()
 same => n,Echo()
 same => n,Hangup()

; Wait test — keeps call alive for 30 seconds (debugging)
exten => 9998,1,NoOp(Wait test)
 same => n,Progress()
 same => n,Wait(1)
 same => n,Answer()
 same => n,Wait(30)
 same => n,Hangup()

; ---------------------------------------------------------------
; SIP MESSAGE relay context (RFC 3428)
; ---------------------------------------------------------------
[xphone-messages]
exten => _X.,1,NoOp(MESSAGE from ${MESSAGE(from)} to ${MESSAGE(to)})
 same => n,Set(ACTUAL_TO=${CUT(MESSAGE(to),@,1)})
 same => n,Set(ACTUAL_TO=${CUT(ACTUAL_TO,:,2)})
 same => n,MessageSend(pjsip:${ACTUAL_TO},${MESSAGE(from)})
 same => n,Hangup()
