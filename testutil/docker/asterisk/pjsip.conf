;
; pjsip.conf — Static config for xphone integration tests
; Three extensions: 1001, 1002, 1003 (password: "test" for all)
;

[global]
type=global
endpoint_identifier_order=username,ip

; --- Transport ---
; Auto-generated at startup by entrypoint.sh
#include pjsip_transport.conf

; === Extension 1001 ===

[1001]
type=endpoint
context=xphone-test
disallow=all
allow=ulaw
allow=alaw
allow=g722
auth=1001-auth
aors=1001
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
dtmf_mode=rfc4733
message_context=xphone-messages

[1001-auth]
type=auth
auth_type=userpass
username=1001
password=test

[1001]
type=aor
max_contacts=1
remove_existing=yes
qualify_frequency=30

